<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#05101f">
  <title>WenMind × TeamPro 心理雷達</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button class="brand" id="homeButton" type="button" aria-label="回首頁">
        <span class="brand-mark"><img src="wen logo.png" alt=""></span>
        <span>
          <strong>WenMind × TeamPro</strong>
          <small>心理雷達 Sports Psychology Radar</small>
        </span>
      </button>
      <nav class="role-tabs" aria-label="主要入口">
        <button class="tab active" id="athleteTab" type="button">選手端</button>
        <button class="tab" id="coachTab" type="button">教練端</button>
      </nav>
    </header>

    <main id="app" class="screen" tabindex="-1"></main>
  </div>

  <template id="radarTemplate">
    <figure class="radar-card">
      <canvas class="radar-canvas" width="620" height="620"></canvas>
      <figcaption class="radar-caption"></figcaption>
    </figure>
  </template>

  <script src="app.js"></script>
</body>
</html>
